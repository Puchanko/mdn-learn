    <h1>リス</h1>

    <p>
        リスは一般的に樹上性の哺乳類であると考えられていますが、リス科はそれ以上に広がり、シマリスやプレーリードッグなどの地上性齧歯類や、ムササビも含まれます。
    </p>

    <p>最も一般的で良く知られているリス科の種のうち、代表的な２種は以下の通りです。</p>

    <ul>
        <a href="https://ja.wikipedia.org/wiki/%E3%82%AD%E3%82%BF%E3%83%AA%E3%82%B9" title="Sciurus vulgaris"
            target="_blank">
            <li>キタリス</li>
        </a>
        <a href="https://ja.wikipedia.org/wiki/%E3%83%88%E3%82%A6%E3%83%96%E3%83%8F%E3%82%A4%E3%82%A4%E3%83%AD%E3%83%AA%E3%82%B9"
            title="Sciurus carolinensis" target="_blank">
            <li>トウブハイイロリス</li>
        </a>
    </ul>

        リスに関する情報の良い出発点としては、<a href="https://ja.wikipedia.org/wiki/%E3%83%AA%E3%82%B9">ウィキペディアのリスのページ</a>を参照してください。
